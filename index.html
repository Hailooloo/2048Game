<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>2048 · 数字合成</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orbs">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <main class="app">
    <header class="app-header">
      <div class="title-block">
        <h1 class="logo">2048</h1>
        <p class="subtitle">合并相同数字，冲击 <strong>2048</strong></p>
      </div>

      <div class="score-cluster">
        <div class="score-card">
          <span class="score-label">当前分</span>
          <span class="score-value" id="score">0</span>
          <span class="score-add" id="score-add"></span>
        </div>
        <div class="score-card best">
          <span class="score-label">最高分</span>
          <span class="score-value" id="best">0</span>
        </div>
      </div>
    </header>

    <section class="toolbar">
      <button class="btn btn-primary" id="new-game">
        <svg viewBox="0 0 24 24" class="ico"><path d="M12 5V2L8 6l4 4V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7z"/></svg>
        新游戏
      </button>
      <button class="btn btn-ghost" id="undo" disabled>
        <svg viewBox="0 0 24 24" class="ico"><path d="M12 5V1L7 6l5 5V7a6 6 0 1 1-6 6H4a8 8 0 1 0 8-8z" transform="scale(-1,1) translate(-24,0)"/></svg>
        撤销
      </button>
      <button class="btn btn-ghost btn-icon" id="help" aria-label="玩法说明">
        <svg viewBox="0 0 24 24" class="ico"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm.9 15.3h-1.8v-1.8h1.8v1.8zm1.86-6.96-.81.83c-.65.66-1.05 1.2-1.05 2.58h-1.8v-.45c0-1.02.4-1.94 1.05-2.6l1.12-1.14c.33-.32.51-.77.51-1.26a1.98 1.98 0 0 0-3.96 0H8.01a3.99 3.99 0 1 1 7.98 0c0 .8-.32 1.52-.84 2.04z"/></svg>
        玩法
      </button>
    </section>

    <section class="board-wrap">
      <div class="board" id="board">
        <div class="grid-bg" id="grid-bg"></div>
        <div class="tile-layer" id="tile-layer"></div>

        <div class="overlay" id="overlay" hidden>
          <div class="overlay-inner">
            <h2 class="overlay-title" id="overlay-title">游戏结束</h2>
            <p class="overlay-sub" id="overlay-sub">本局得分 0</p>
            <button class="btn btn-primary" id="overlay-btn">再来一局</button>
          </div>
        </div>
      </div>
    </section>

  </main>

  <div class="modal" id="help-modal" hidden>
    <div class="modal-mask" data-close></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="help-title">
      <button class="modal-close" id="help-close" aria-label="关闭">
        <svg viewBox="0 0 24 24"><path d="M18.3 5.71 12 12l6.3 6.29-1.42 1.42L10.59 13.4 5.71 18.3l-1.42-1.42L9.17 12 4.29 7.12l1.42-1.42L10.59 10.6l4.88-4.89z"/></svg>
      </button>
      <h2 class="modal-title" id="help-title">玩法说明</h2>

      <ul class="rule-list">
        <li class="rule-item">
          <span class="rule-ico">🎯</span>
          <div><b>目标</b><p>合并相同数字，凑出 <strong>2048</strong> 即获胜，可继续挑战更高数字。</p></div>
        </li>
        <li class="rule-item">
          <span class="rule-ico">👆</span>
          <div><b>手机操作</b><p>在屏幕任意位置上下左右滑动手指，即可整体移动方块。</p></div>
        </li>
        <li class="rule-item">
          <span class="rule-ico">⌨️</span>
          <div><b>键盘操作</b><p><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 移动 · <kbd>Z</kbd> 撤销 · <kbd>R</kbd> 重开</p></div>
        </li>
        <li class="rule-item">
          <span class="rule-ico">↩️</span>
          <div><b>撤销与重开</b><p>点「撤销」回退上一步，点「新游戏」重新开始，最高分会自动保存。</p></div>
        </li>
      </ul>

      <button class="btn btn-primary modal-ok" id="help-ok">明白了，开玩</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
